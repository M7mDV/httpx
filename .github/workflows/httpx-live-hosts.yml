name: httpx Live Hosts Discovery

on:
  workflow_dispatch:
  
  workflow_run:
    workflows: ["Amass Subdomain Enumeration"]
    types:
      - completed
  
  push:
    branches: [main]
    paths:
      - 'subs.txt'

jobs:
  httpx-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install httpx
        run: |
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
          httpx -version

      - name: Run httpx Scan
        run: |
          if [ ! -f subs.txt ]; then
            echo "❌ subs.txt not found!"
            exit 1
          fi
          
          echo "=== Starting httpx scan ==="
          echo "Total subdomains in subs.txt: $(wc -l < subs.txt)"
          
          # Top 100 ports (nmap top-ports equivalent)
          cat subs.txt | httpx \
            -t 60 \
            -nc \
            -p 80,81,300,443,591,593,832,981,1010,1311,2082,2087,2095,2096,2480,3000,3128,3333,4243,4567,4711,4712,4993,5000,5104,5108,5800,6543,7000,7396,7474,8000,8001,8008,8014,8042,8069,8080,8081,8088,8090,8091,8118,8123,8172,8222,8243,8280,8281,8333,8443,8500,8834,8880,8888,8983,9000,9043,9060,9080,9090,9091,9200,9443,9800,9981,12443,16080,18091,18092,20720,28017 \
            -o live.txt
          
          echo "=== httpx scan completed ==="
          echo "Total live hosts found: $(wc -l < live.txt)"
          echo "=== Results ==="
          cat live.txt

      - name: Send Results to Discord (as File)
        if: success()
        run: |
          SUBS_COUNT=$(wc -l < subs.txt)
          LIVE_COUNT=$(wc -l < live.txt)
          
          curl -X POST \
            -H "Content-Type: multipart/form-data" \
            -F "file=@live.txt" \
            -F "payload_json={
              \"username\": \"httpx Bot\",
              \"avatar_url\": \"https://avatars.githubusercontent.com/u/50994705\",
              \"embeds\": [{
                \"title\": \"🌐 httpx Live Hosts Discovery\",
                \"description\": \"Scan completed successfully!\",
                \"color\": 3066993,
                \"fields\": [
                  {
                    \"name\": \"📥 Input Subdomains\",
                    \"value\": \"${SUBS_COUNT}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"✅ Live Hosts Found\",
                    \"value\": \"${LIVE_COUNT}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"⚡ Threads\",
                    \"value\": \"60\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"📎 Attachment\",
                    \"value\": \"live.txt\",
                    \"inline\": true
                  }
                ],
                \"footer\": {
                  \"text\": \"httpx • $(date -u +\"%Y-%m-%d %H:%M UTC\")\" 
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Upload Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: httpx-live-hosts
          path: live.txt
